version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: hoalang_mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: hoalang_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  meilisearch:
    image: getmeili/meilisearch:v1.3
    container_name: hoalang_meilisearch
    restart: always
    ports:
      - "7700:7700"
    environment:
      - MEILI_MASTER_KEY=masterKey123456
      - MEILI_ENV=development
    volumes:
      - meili_data:/meili_data

volumes:
  mongodb_data:
  redis_data:
  meili_data:
