version: '3.8'

# ─────────────────────────────────────────────────────────────
#  HoaLang Multi-Tenant SaaS — Docker Compose
#
#  Services:
#   • mongodb-primary   — MongoDB 7 primary (replica set ready)
#   • redis             — Redis 7 for token blacklist + caching
#   • meilisearch       — Full-text search engine
#   • api               — HoaLang Express API server
# ─────────────────────────────────────────────────────────────

services:

  # ── MongoDB (Replica Set capable) ────────────────────────────
  mongodb-primary:
    image: mongo:7.0
    container_name: hoalang_mongodb
    restart: always
    command: >
      mongod
      --replSet rs0
      --bind_ip_all
      --keyFile /etc/mongo-keyfile
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-hoalang_secret}
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ./scripts/mongo-keyfile:/etc/mongo-keyfile:ro
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - hoalang_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Replica Set Initializer (one-shot) ────────────────────────
  mongo-rs-init:
    image: mongo:7.0
    container_name: hoalang_mongo_rs_init
    depends_on:
      mongodb-primary:
        condition: service_healthy
    command: >
      mongosh
      --host mongodb-primary:27017
      -u ${MONGO_ROOT_USER:-admin}
      -p ${MONGO_ROOT_PASSWORD:-hoalang_secret}
      --authenticationDatabase admin
      --eval "rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'mongodb-primary:27017' }] })"
    networks:
      - hoalang_network
    restart: "no"

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hoalang_redis
    restart: always
    command: redis-server --save 20 1 --loglevel warning --requirepass ${REDIS_PASSWORD:-hoalang_redis}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hoalang_network
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD:-hoalang_redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Meilisearch ───────────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: hoalang_meilisearch
    restart: always
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-masterKey_HoaLang_2024}
      MEILI_ENV: ${MEILI_ENV:-development}
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meili_data:/meili_data
    networks:
      - hoalang_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── HoaLang API Server ────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hoalang_api
    restart: always
    ports:
      - "${PORT:-5000}:5000"
    depends_on:
      mongodb-primary:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      # Core DB — connects to hoalang_core
      CORE_MONGODB_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-hoalang_secret}@mongodb-primary:27017/hoalang_core?authSource=admin&replicaSet=rs0
      # Tenant DB base URI — tenant_battrang, tenant_vanphuc, etc.
      TENANT_MONGODB_BASE_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-hoalang_secret}@mongodb-primary:27017
      REDIS_URL: redis://:${REDIS_PASSWORD:-hoalang_redis}@redis:6379
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_API_KEY: ${MEILI_MASTER_KEY:-masterKey_HoaLang_2024}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-jwt_access_secret_change_in_prod}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-jwt_refresh_secret_change_in_prod}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    volumes:
      - ./logs:/app/logs
    networks:
      - hoalang_network

# ── Volumes ───────────────────────────────────────────────────
volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local
  meili_data:
    driver: local

# ── Networks ──────────────────────────────────────────────────
networks:
  hoalang_network:
    driver: bridge
